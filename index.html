---
layout: default
title: Home
---

<div class="home">
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
  
  <h2>Recent Posts</h2>
  <ul class="post-list">
    {% for post in site.posts limit: 10 %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
